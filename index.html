<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mer Jemterud 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&family=Permanent+Marker&display=swap"
        rel="stylesheet">
<style>
  :root {
    --paper: #f6f4ef;
    --marker-black: #0a0a0a;
    --ink: #181818;
    --concrete-grey: #999999;
    --studio-grey: #666666;
    --tape-yellow: #ffe850;
    --font-marker: 'Permanent Marker', 'Comic Sans MS', cursive;
    --font-body: 'Open Sans', system-ui, -apple-system, sans-serif;
  }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1rem;
    box-sizing: border-box;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(0deg, rgba(10, 10, 10, 0.05) 0 1px, transparent 1px 28px),
    repeating-linear-gradient(90deg, rgba(10, 10, 10, 0.05) 0 1px, transparent 1px 28px);
    pointer-events: none;
    z-index: 0;
  }
  main {
    position: relative;
    z-index: 1;
    max-width: 760px;
    width: 100%;
    box-sizing: border-box;
  }

  h1 {
    margin: 0 0 2.5rem;
    font-family: var(--font-marker);
    font-weight: 400;
    text-transform: uppercase;
    line-height: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35em;
    color: var(--marker-black);
  }

  h1 .tape {
    display: inline-block;
    background: var(--concrete-grey);
    color: var(--marker-black);
    padding: 0.32em 0.55em 0.22em;
    box-shadow: 2px 2px 0 rgba(10, 10, 10, 0.18);
    letter-spacing: 0.01em;
    max-width: 100%;
  }

  h1 .tape-1 {
    font-size: clamp(2rem, 7vw, 4.25rem);
    transform: rotate(-3deg);
    clip-path: polygon(2% 8%, 99% 0%, 98% 92%, 1% 100%);
  }

  h1 .tape-2 {
    font-size: clamp(1.5rem, 5.5vw, 3.25rem);
    transform: rotate(2deg);
    clip-path: polygon(0% 12%, 100% 4%, 99% 96%, 2% 100%);
  }

  .eyebrow {
    margin: 0;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: clamp(0.8rem, 1.5vw, 0.95rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--studio-grey);
    text-align: center;
  }

  ::selection {
    background: var(--tape-yellow);
    color: var(--marker-black);
  }
</style>
</head>
<body>
  <main>
    <h1><span class="tape tape-1">Enda mer Jemterud </span><span class="tape tape-2">i monitor plis!</span></h1>
    <p class="eyebrow">4. – 6. september 2026</p>
  </main>
</body>
</html>
