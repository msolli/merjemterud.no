<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:#0a0a0a;overflow:hidden;font-family:var(--font-body);}
  .card{width:700px;height:260px;position:relative;display:flex;gap:0;}
  .ph{flex:1;position:relative;overflow:hidden;background:#222;}
  .ph img{width:100%;height:100%;object-fit:cover;filter:grayscale(1) contrast(1.25) brightness(0.9);mix-blend-mode:normal;}
  .ph::after{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(0,0,0,0.18) 0 1px,transparent 1px 3px);mix-blend-mode:multiply;pointer-events:none;}
  .tape{position:absolute;bottom:14px;left:14px;background:#ffe850;color:#0a0a0a;font-family:'Permanent Marker',cursive;text-transform:uppercase;font-size:13px;padding:4px 10px 3px;transform:rotate(-3deg);clip-path:polygon(2% 8%,99% 0%,98% 92%,1% 100%);line-height:1;z-index:2;}
  .lbl{position:absolute;top:10px;left:14px;font-family:var(--font-body);font-weight:700;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,0.6);padding:3px 8px;z-index:3;}
</style>
</head>
<body>
<div class="card">
  <div class="lbl">PHOTOGRAPHY — B&W HALFTONE TREATMENT</div>
  <div class="ph"><img src="../assets/photos/venue.jpg" /><span class="tape">ALCATRAZ</span></div>
  <div class="ph"><img src="../assets/photos/band-okkultokrati.jpg" /><span class="tape">OKKULTOKRATI</span></div>
  <div class="ph"><img src="../assets/photos/band-tusmorke.jpg" /><span class="tape">TUSMØRKE</span></div>
  <div class="ph"><img src="../assets/photos/band-spelemann.jpg" /><span class="tape">SVARTSKOG</span></div>
</div>
</body></html>
