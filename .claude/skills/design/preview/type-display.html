<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:var(--paper);overflow:hidden;font-family:var(--font-body);}
  .card{width:700px;height:260px;padding:0;position:relative;overflow:hidden;}
  .wall{position:absolute;inset:0;background:#999;}
  .marker-title{position:absolute;top:38px;left:36px;font-family:'Permanent Marker',cursive;color:#0a0a0a;font-size:96px;line-height:0.9;letter-spacing:0.01em;transform:rotate(-3deg);}
  .marker-sub{position:absolute;bottom:30px;left:40px;font-family:'Permanent Marker',cursive;color:#0a0a0a;font-size:34px;transform:rotate(-2deg);}
  .meta{position:absolute;top:14px;right:24px;font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#0a0a0a;background:#ffe850;padding:4px 10px 3px;transform:rotate(2deg);}
</style>
</head>
<body>
<div class="card">
  <div class="wall"></div>
  <div class="marker-title">JEMTERUD<br/>50</div>
  <div class="marker-sub">enda mer plis</div>
  <div class="meta">DISPLAY · PERMANENT MARKER</div>
</div>
</body></html>
