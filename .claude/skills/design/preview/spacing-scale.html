<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:var(--paper);overflow:hidden;font-family:var(--font-body);}
  .card{width:700px;height:200px;padding:24px 28px;position:relative;}
  .lbl{font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#666;margin-bottom:14px;}
  .row{display:flex;align-items:center;gap:14px;}
  .box{background:#0a0a0a;}
  .b1{width:4px;height:80px;}
  .b2{width:8px;height:80px;}
  .b3{width:16px;height:80px;}
  .b4{width:24px;height:80px;}
  .b5{width:32px;height:80px;}
  .b6{width:48px;height:80px;}
  .b7{width:64px;height:80px;}
  .b8{width:96px;height:80px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .tag{font-family:var(--font-mono);font-size:10px;color:#666;}
  .tag b{display:block;font-family:var(--font-body);font-weight:700;color:#0a0a0a;font-size:11px;}
</style>
</head>
<body>
<div class="card">
  <div class="lbl">SPACING SCALE — 4PX BASE</div>
  <div class="row">
    <div class="item"><div class="box b1"></div><div class="tag"><b>s-1</b>4</div></div>
    <div class="item"><div class="box b2"></div><div class="tag"><b>s-2</b>8</div></div>
    <div class="item"><div class="box b3"></div><div class="tag"><b>s-3</b>12</div></div>
    <div class="item"><div class="box b4"></div><div class="tag"><b>s-4</b>16</div></div>
    <div class="item"><div class="box b5"></div><div class="tag"><b>s-5</b>24</div></div>
    <div class="item"><div class="box b6"></div><div class="tag"><b>s-6</b>32</div></div>
    <div class="item"><div class="box b7"></div><div class="tag"><b>s-7</b>48</div></div>
    <div class="item"><div class="box b8"></div><div class="tag"><b>s-8</b>64</div></div>
  </div>
</div>
</body></html>
