<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:#0a0a0a;overflow:hidden;font-family:var(--font-body);}
  .card{width:700px;height:200px;position:relative;display:flex;align-items:center;justify-content:center;background:#0a0a0a;padding:20px;box-sizing:border-box;}
  .banner{max-width:100%;max-height:100%;width:auto;height:auto;display:block;}
  .lbl{position:absolute;bottom:10px;left:14px;font-family:var(--font-body);font-weight:700;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,0.6);padding:4px 8px;}
</style>
</head>
<body>
<div class="card">
  <img src="../assets/web-banner_2026.png" class="banner" alt="2026 web banner" />
  <div class="lbl">WEB BANNER 2026 · 2020 × 400</div>
</div>
</body></html>
