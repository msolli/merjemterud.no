<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:var(--paper);overflow:hidden;font-family:var(--font-body);}
  .card{width:700px;height:200px;padding:24px 28px;display:flex;flex-direction:column;justify-content:center;gap:18px;position:relative;}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .swatch{width:128px;height:96px;border:1.5px solid #0a0a0a;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-mono);font-size:11px;color:#0a0a0a;}
  .swatch.dark{color:#f6f4ef;}
  .swatch .name{font-weight:700;font-family:var(--font-body);text-transform:uppercase;letter-spacing:0.04em;font-size:11px;line-height:1.2;}
  .swatch .hex{opacity:.7;font-size:10px;margin-top:2px;}
  .swatch .use{font-size:10px;opacity:.6;margin-top:6px;font-family:var(--font-body);}
  .lbl{position:absolute;top:14px;left:24px;font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#666;}
</style>
</head>
<body>
<div class="card">
  <div class="lbl">ACCENTS — USE SPARINGLY</div>
  <div class="row">
    <div class="swatch dark" style="background:#e63946;">
      <span class="name">Frequency Red</span><span class="hex">#E63946</span>
      <span class="use">"on air", errors</span>
    </div>
    <div class="swatch" style="background:#7fd4d4;">
      <span class="name">Oscilloscope Cyan</span><span class="hex">#7FD4D4</span>
      <span class="use">traces, dark-bg links</span>
    </div>
    <div class="swatch" style="background:#ecead9;">
      <span class="name">Paper Deep</span><span class="hex">#ECEAD9</span>
      <span class="use">recessed surface</span>
    </div>
    <div class="swatch" style="background:#f0d83a;">
      <span class="name">Tape Dim</span><span class="hex">#F0D83A</span>
      <span class="use">tape shadow / press</span>
    </div>
  </div>
</div>
</body></html>
