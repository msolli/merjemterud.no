<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:var(--paper);overflow:hidden;font-family:var(--font-body);}
  .card{width:700px;height:200px;padding:24px 28px;position:relative;}
  .lbl{font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#666;margin-bottom:10px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-family:var(--font-mono);font-size:13px;}
  .item{padding:8px 12px;background:#ecead9;border:1px solid rgba(0,0,0,0.1);display:flex;justify-content:space-between;align-items:center;}
  .k{color:#666;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;font-family:var(--font-body);font-weight:700;}
  .v{font-feature-settings:"tnum";color:#0a0a0a;}
</style>
</head>
<body>
<div class="card">
  <div class="lbl">MONOSPACE — TECHNICAL / NUMERIC</div>
  <div class="grid">
    <div class="item"><span class="k">FREQ</span><span class="v">97.4 MHz FM</span></div>
    <div class="item"><span class="k">TIME</span><span class="v">23:47:12</span></div>
    <div class="item"><span class="k">SET</span><span class="v">FRI · 21:00 — 22:30</span></div>
    <div class="item"><span class="k">COORD</span><span class="v">59.913°N · 10.752°E</span></div>
    <div class="item"><span class="k">CHAN</span><span class="v">CH 04 / L+R / -12 dB</span></div>
    <div class="item"><span class="k">SLUG</span><span class="v">/set/jemterud-50</span></div>
  </div>
</div>
</body></html>
