<!-- ENDA MER JEMTERUD I MONITOR PLIS — festival skin for oiiku registration -->
<style>
    @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Open+Sans:wght@400;600;700;800&display=swap');

    :root {
        --tape-yellow: #ffe850;
        --marker-black: #0a0a0a;
        --ink: #181818;
        --paper: #f6f4ef;
        --card: #fffef9;
        --concrete-grey: #999;
        --studio-grey: #666;
        --freq-red: #e63946;
        --font-marker: 'Permanent Marker', 'Comic Sans MS', cursive;
        --font-body: 'Open Sans', system-ui, -apple-system, sans-serif;
    }

    /* ---- page surface: warm paper + faint notebook grid ---- */
    html body {
        background-color: var(--paper) !important;
        background-image: repeating-linear-gradient(0deg, rgba(10, 10, 10, .045) 0 1px, transparent 1px 28px),
        repeating-linear-gradient(90deg, rgba(10, 10, 10, .045) 0 1px, transparent 1px 28px) !important;
        color: var(--ink) !important;
        font-family: var(--font-body) !important;
    }

    html body, input, textarea, select {
        font-family: var(--font-body) !important;
    }

    /* ---- swap the empty header img for the real festival banner ---- */
    .oiiku-header {
        margin-top: 26px;
        margin-bottom: 14px;
    }

    .oiiku-header img {
        content: url('https://merjemterud.no/images/web-banner_2026.png');
        display: block;
        width: 100%;
        height: auto;
        border: 3px solid var(--marker-black);
        box-shadow: 6px 6px 0 var(--marker-black);
    }

    /* ---- headlines: marker on paper ---- */
    #content h1 {
        font-family: var(--font-marker) !important;
        font-weight: 400 !important;
        text-transform: uppercase !important;
        letter-spacing: 0 !important;
        line-height: 1.05 !important;
        color: var(--marker-black) !important;
        font-size: clamp(1.7rem, 4.5vw, 2.7rem) !important;
        text-align: center;
    }

    .oiiku-form-title {
        font-family: var(--font-marker) !important;
        font-weight: 400 !important;
        text-transform: uppercase !important;
        color: var(--marker-black) !important;
    }

    /* invite line gets a yellow marker highlight */
    #content p strong {
        background: var(--tape-yellow);
        color: var(--marker-black);
        padding: .04em .28em;
        -webkit-box-decoration-break: clone;
        box-decoration-break: clone;
    }

    /* ---- section titles become yellow gaffer-tape labels ---- */
    .form-section-title {
        display: inline-block;
        font-family: var(--font-marker) !important;
        font-weight: 400 !important;
        color: var(--marker-black) !important;
        background: var(--tape-yellow);
        padding: .18em .5em .12em;
        margin-top: 6px;
        text-transform: uppercase;
        font-size: 2rem;
        line-height: 1.1;
        transform: rotate(-2deg);
        box-shadow: 2px 2px 0 rgba(10, 10, 10, .18);
        clip-path: polygon(1% 6%, 99% 0%, 98% 94%, 2% 100%);
    }

    .form-section-title:empty {
        display: none !important;
    }

    /* ---- field group = brutalist card ---- */
    html body .form-section-fields {
        border: 1.5px solid var(--marker-black) !important;
        border-radius: 0 !important;
        background: var(--card) !important;
        box-shadow: 4px 4px 0 var(--marker-black);
        padding: 18px 20px !important;
    }

    html body .form-section-fields.form-section-selected {
        border-color: var(--marker-black) !important;
    }

    /* ---- force the stacked (mobile) layout on every screen size ----
       Oiiku wraps each section as Bootstrap 3 grid columns:
         title  -> .form-section.col-sm-5
         fields -> .form-section-temp.col-sm-7 (+ .col-sm-offset-5)
       The form title gets its own offset column with no oiiku class:
         <div class="col-sm-7 col-sm-offset-5"><h1 class="oiiku-form-title">
       so we match it by the column that wraps .oiiku-form-title (:has).
       At >=768px those col-sm-* rules float them side-by-side. We want the
       title stacked ABOVE the fields full-width everywhere (the <768px look).
       Media queries add no specificity, and Bootstrap 3's grid uses no
       !important, so a non-media !important reset here wins at all widths. */
    html body .form-section,
    html body .form-section-temp,
    html body .row > *:has(> .oiiku-form-title) {
        float: none !important;
        width: 100% !important;
        max-width: 100% !important;
        margin-left: 0 !important; /* neutralizes col-sm-offset-5 */
        text-align: inherit;
    }

    /* ---- narrow the page container on large screens only ----
       Bootstrap 3 sets `.container { width: 1170px }` inside
       @media (min-width: 1200px). We want 970px there instead, but ONLY at
       >=1200px (leave the smaller breakpoints' container widths untouched).
       So the override must live in a MATCHING media query -- a non-media rule
       would apply 970px universally, which is not what we want. Same media
       query + higher specificity + !important wins over Bootstrap's rule. */
    @media (min-width: 1200px) {
        html body .container {
            width: 970px !important;
        }
    }

    /* ---- labels ---- */
    .oiiku-label {
        font-family: var(--font-body) !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: .06em !important;
        color: var(--ink) !important;
    }

    .missing-warning {
        color: var(--freq-red) !important;
        font-weight: 700 !important;
        text-transform: none;
    }

    .invalid-msg {
        color: var(--freq-red) !important;
        font-weight: 700;
    }

    .text-decoration b {
        background: var(--tape-yellow);
        padding: .02em .22em;
        -webkit-box-decoration-break: clone;
        box-decoration-break: clone;
    }

    /* ---- inputs / textarea / select ---- */
    html body .oiiku-input {
        background: var(--paper) !important;
        color: var(--marker-black) !important;
        border: 1.5px solid var(--marker-black) !important;
        border-radius: 2px !important;
        box-shadow: none !important;
    }

    html body .oiiku-input:focus, html body .oiiku-input:active, html body .oiiku-input.focused {
        border-color: var(--marker-black) !important;
        outline: 3px solid var(--tape-yellow) !important;
        outline-offset: 2px !important;
    }

    /* ---- radio chips: native dot black, selected chip = yellow tape ---- */
    html body .oiiku-field input[type="radio"] {
        accent-color: var(--marker-black);
    }

    html body .oiiku-radio-alternative {
        padding: 0 5px;
        border: 1.5px solid var(--marker-black) !important;
        border-radius: 2px !important;
        background: var(--card) !important;
        color: var(--marker-black) !important;
        font-weight: 600;
    }

    html body input[type="radio"]:checked + .oiiku-radio-alternative {
        background: var(--tape-yellow) !important;
        border-color: var(--marker-black) !important;
        color: var(--marker-black) !important;
        box-shadow: 2px 2px 0 var(--marker-black);
    }

    html body input[type="radio"]:focus + .oiiku-radio-alternative {
        outline: 3px solid var(--tape-yellow);
        outline-offset: 2px;
    }

    /* ---- primary button: yellow, hard shadow, invert on hover ---- */
    html body .btn-primary {
        background: var(--tape-yellow) !important;
        color: var(--marker-black) !important;
        border: 1.5px solid var(--marker-black) !important;
        border-radius: 2px !important;
        box-shadow: 4px 4px 0 var(--marker-black) !important;
        font-family: var(--font-body) !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: .06em !important;
    }

    html body .btn-primary:hover, html body .btn-primary:focus {
        background: var(--marker-black) !important;
        color: var(--tape-yellow) !important;
    }

    html body .btn-primary:active {
        background: var(--marker-black) !important;
        color: var(--tape-yellow) !important;
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--marker-black) !important;
    }

    /* ---- links: black w/ yellow marker highlight on hover ---- */
    #content a, .oiiku-footer a {
        color: var(--marker-black) !important;
        text-decoration: underline !important;
        text-underline-offset: 3px;
    }

    #content a:hover, .oiiku-footer a:hover {
        background: var(--tape-yellow) !important;
        text-decoration: none !important;
    }

    ::selection {
        background: var(--tape-yellow);
        color: var(--marker-black);
    }
</style>
